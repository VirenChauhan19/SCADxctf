# Firebase App Hosting — build & runtime config for this Next.js app.
# Docs: https://firebase.google.com/docs/app-hosting/configure
#
# App Hosting runs the full Next.js server (SSR, API routes, middleware) on
# Cloud Run, so login / database / the nonce-CSP middleware all work.

runConfig:
  # One instance stays warm around the clock, so nobody ever waits on a cold
  # start (container boot + Next.js + Prisma engine init was the 10-20s "the
  # page won't load" stall on phones). This is the one line here that costs
  # money: roughly $10-25/month for the always-on instance. Set it back to 0 to
  # return to the free scale-to-zero behavior and accept cold starts again.
  minInstances: 1
  maxInstances: 3
  concurrency: 80
  cpu: 1
  memoryMiB: 1024

env:
  # Postgres connection string (use your provider's POOLED string).
  # Create the secret with:  firebase apphosting:secrets:set DATABASE_URL
  - variable: DATABASE_URL
    secret: DATABASE_URL
    availability:
      - BUILD
      - RUNTIME

  # Session-signing secret — must be long + random (prod refuses weak secrets).
  # Create with:  firebase apphosting:secrets:set JWT_SECRET
  - variable: JWT_SECRET
    secret: JWT_SECRET
    availability:
      - RUNTIME

  # Optional: gate self-signup to your team. Uncomment, then create the secret.
  # - variable: TEAM_INVITE_CODE
  #   secret: TEAM_INVITE_CODE
  #   availability:
  #     - RUNTIME
